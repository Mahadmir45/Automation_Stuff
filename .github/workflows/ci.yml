name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - embedded-test-automation
          - cloud-governance-suite
          - infra-self-service-portal
          - workflow-orchestration-hub

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project dependencies
        working-directory: ${{ matrix.project }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest requests

      - name: Run tests
        working-directory: ${{ matrix.project }}
        run: |
          if [ "${{ matrix.project }}" = "embedded-test-automation" ]; then
            pytest -m "not integration"
          else
            pytest
          fi

  go-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run Go tests
        working-directory: reddit-wallpaper-archiver
        run: go test ./...
